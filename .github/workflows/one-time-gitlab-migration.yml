name: One-time GitLab migration

on:
  push:
    branches:
      - main
  pull_request:
  issues:
    types:
      - opened
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror source branches and tags into this repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT_ISSUE: "3"
        run: |
          set -euo pipefail
          gitlab_source="https://gitlab.com/ales27pm/worldDOMINATION.git"
          github_fallback="https://github.com/ales27pm/worldDOMINATION.git"
          destination_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          comment() {
            gh issue comment "$REPORT_ISSUE" --repo "$GITHUB_REPOSITORY" --body "$1" || true
          }

          comment "Migration workflow started for event ${GITHUB_EVENT_NAME}."

          if git clone --mirror "$gitlab_source" source.git; then
            comment "GitLab source cloned successfully."
          else
            rm -rf source.git
            comment "GitLab could not be cloned anonymously; using the exact existing GitHub mirror ales27pm/worldDOMINATION as the fallback source."
            if ! git clone --mirror "$github_fallback" source.git; then
              comment "Migration failed: neither source repository could be cloned."
              exit 20
            fi
          fi

          cd source.git
          if [ -z "$(git for-each-ref --format='%(refname)' refs/heads)" ]; then
            comment "Migration failed: the source clone contained no branches."
            exit 21
          fi

          if ! git push --force "$destination_url" 'refs/heads/*:refs/heads/*'; then
            comment "Migration failed while pushing branches to the destination."
            exit 30
          fi

          if ! git push --force "$destination_url" 'refs/tags/*:refs/tags/*'; then
            comment "Branches were copied, but pushing tags failed."
            exit 31
          fi

          comment "Migration completed successfully."
