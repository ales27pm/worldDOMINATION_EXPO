name: One-time GitLab migration

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror source branches and tags into this repository
        env:
          GH_TOKEN: ${{ github.token }}
          TRIGGER_ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          gitlab_source="https://gitlab.com/ales27pm/worldDOMINATION.git"
          github_fallback="https://github.com/ales27pm/worldDOMINATION.git"
          destination_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          comment() {
            if [ -n "${TRIGGER_ISSUE:-}" ]; then
              gh issue comment "$TRIGGER_ISSUE" --repo "$GITHUB_REPOSITORY" --body "$1" || true
            fi
          }

          comment "Migration workflow started."

          if git clone --mirror "$gitlab_source" source.git; then
            comment "GitLab source cloned successfully."
          else
            rm -rf source.git
            comment "GitLab could not be cloned anonymously; using the exact existing GitHub mirror ales27pm/worldDOMINATION as the fallback source."
            git clone --mirror "$github_fallback" source.git
          fi

          cd source.git
          test -n "$(git for-each-ref --format='%(refname)' refs/heads)"

          git push --force "$destination_url" 'refs/heads/*:refs/heads/*'
          git push --force "$destination_url" 'refs/tags/*:refs/tags/*'

          comment "Migration completed successfully."
