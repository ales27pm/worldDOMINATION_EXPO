name: One-time GitLab migration

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Import source snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          gitlab_source="https://gitlab.com/ales27pm/worldDOMINATION.git"
          github_fallback="https://github.com/ales27pm/worldDOMINATION.git"
          destination_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if timeout 90 git clone --depth 1 "$gitlab_source" source; then
            echo "Cloned the GitLab source."
          else
            rm -rf source
            echo "GitLab was not anonymously accessible; cloning the existing GitHub mirror."
            git clone --depth 1 "$github_fallback" source
          fi

          cd source
          rm -rf .git
          rm -rf .github/workflows

          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import worldDOMINATION codebase"
          git push --force "$destination_url" main:main
